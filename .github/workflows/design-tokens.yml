name: 🎨 Design Token Sync

on:
  push:
    paths:
      - 'tokens/tokens.json'   # 토큰 파일이 변경될 때만 실행

jobs:
  sync-tokens:
    name: tokens.json → theme.ts 동기화
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install style-dictionary
        run: npm install --save-dev style-dictionary

      - name: Build tokens (tokens.json → theme.ts)
        run: npx style-dictionary build --config sd.config.js

      - name: Check if theme.ts changed
        id: diff
        run: |
          git diff --quiet src/constants/theme.ts \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true"  >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🎨 design: sync tokens from Figma"
          title: "🎨 디자인 토큰 업데이트"
          body: |
            ## 디자인 토큰 자동 동기화

            Figma Token Studio에서 변경된 내용이 `theme.ts`에 반영되었습니다.

            ### 변경된 파일
            - `tokens/tokens.json` (Figma에서 변경)
            - `src/constants/theme.ts` (자동 재생성)

            ### 검토 체크리스트
            - [ ] 색상 변경 의도 확인 (Figma 비교)
            - [ ] 시뮬레이터에서 시각적 검토
            - [ ] 영향받는 컴포넌트 확인

            ---
            *이 PR은 GitHub Actions가 자동 생성했습니다.*
          branch: "design/token-sync-${{ github.run_number }}"
          labels: "🎨 design,automated"
          delete-branch: true
