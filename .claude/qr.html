<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locotalk QR</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ECFDF5;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
  }
  .card {
    background: #fff;
    border-radius: 28px;
    padding: 40px 48px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.10);
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    max-width: 360px; width: 90%;
  }
  .logo { font-size: 28px; font-weight: 900; color: #1BAE84; letter-spacing: -0.5px; }
  .sub  { font-size: 14px; color: #6B7280; text-align: center; line-height: 1.5; }
  canvas { border-radius: 12px; }
  .url {
    font-size: 13px; color: #1BAE84; font-weight: 700;
    background: #ECFDF5; padding: 8px 16px; border-radius: 999px;
    letter-spacing: 0.2px;
  }
  .hint { font-size: 12px; color: #9CA3AF; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Locotalk</div>
  <div class="sub">Expo Go 앱으로 스캔하거나<br>카메라 앱으로 스캔하세요</div>
  <canvas id="qr"></canvas>
  <div class="url">exp://192.168.1.171:8081</div>
  <div class="hint">📶 같은 WiFi 연결 필수<br>iPhone → 카메라 스캔 → Expo Go에서 열기</div>
</div>
<script>
  QRCode.toCanvas(document.getElementById('qr'), 'exp://192.168.1.171:8081', {
    width: 220, margin: 2,
    color: { dark: '#111827', light: '#ffffff' }
  });
</script>
</body>
</html>
