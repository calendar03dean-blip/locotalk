<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>통신사 본인인증</title>
<script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#40D3B6; display:flex; align-items:center; justify-content:center; height:100vh; font-family:-apple-system,sans-serif; }
  .loader { text-align:center; color:#fff; padding:24px; }
  .icon  { font-size:56px; margin-bottom:16px; }
  .title { font-size:18px; font-weight:800; letter-spacing:-0.5px; }
  .sub   { font-size:13px; margin-top:8px; opacity:0.85; line-height:1.6; }
</style>
</head>
<body>
<div class="loader">
  <div class="icon">💬</div>
  <div class="title">LOCOTALK</div>
  <div class="sub" id="msg">본인인증 화면을 불러오는 중...</div>
</div>
<script>
  // ── PortOne V2 본인인증 ──────────────────────────────────────
  (function () {
    var params     = new URLSearchParams(window.location.search);
    var storeId    = params.get('store_id')    || 'store-0cedce90-6165-447b-8694-40fb67ec7481';
    var channelKey = params.get('channel_key') || 'channel-key-d62a950a-f69e-49e9-9704-f13b94a0b71b';
    var vid        = params.get('vid')         || ('identity-verification-' + Date.now());

    function post(obj){
      var s = JSON.stringify(obj);
      if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(s);
      else window.location.href = 'locotalk://certification?data=' + encodeURIComponent(s);
    }

    if (typeof PortOne === 'undefined') { post({success:false, error:'SDK 로드 실패'}); return; }

    try {
      PortOne.requestIdentityVerification({
        storeId: storeId,
        identityVerificationId: vid,
        channelKey: channelKey,
        // 모바일(WebView)에서는 redirect 모드로 동작 → cert-result.html 이 결과 수신
        redirectUrl: 'https://calendar03dean-blip.github.io/locotalk/cert-result.html'
      }).then(function (rsp) {
        // 데스크탑/팝업 모드에서만 여기로 결과가 옴 (모바일은 redirect)
        if (rsp && rsp.code != null) {
          post({ success:false, error: rsp.message || '본인인증이 취소되었습니다' });
        } else {
          post({ success:true, identityVerificationId: (rsp && rsp.identityVerificationId) || vid });
        }
      }).catch(function (e) {
        post({ success:false, error: String((e && e.message) || e) });
      });
    } catch (e) {
      document.getElementById('msg').textContent = '본인인증을 시작할 수 없습니다';
      post({ success:false, error: String((e && e.message) || e) });
    }
  })();
</script>
</body>
</html>
