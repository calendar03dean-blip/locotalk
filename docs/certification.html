<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>통신사 본인인증</title>
<script src="https://cdn.iamport.kr/js/iamport.payment-1.2.0.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#40D3B6; display:flex; align-items:center; justify-content:center; height:100vh; font-family:-apple-system,sans-serif; }
  .loader { text-align:center; color:#fff; }
  .icon  { font-size:56px; margin-bottom:16px; }
  .title { font-size:18px; font-weight:800; letter-spacing:-0.5px; }
  .sub   { font-size:13px; margin-top:8px; opacity:0.8; }
</style>
</head>
<body>
<div class="loader">
  <div class="icon">💬</div>
  <div class="title">LOCOTALK</div>
  <div class="sub">본인인증 진행 중...</div>
</div>
<script>
  const params     = new URLSearchParams(window.location.search);
  const merchant   = params.get('merchant_uid') || 'locotalk_' + Date.now();
  const STORE_ID   = 'imp18543766';
  const CHANNEL_KEY = 'channel-key-d62a950a-f69e-49e9-9704-f13b94a0b71b';

  IMP.init(STORE_ID);

  IMP.certification({
    merchant_uid : merchant,
    pg           : 'inicis',     // KG이니시스
    channel_key  : CHANNEL_KEY,  // 테스트 채널
    popup        : false,
  }, function(rsp) {
    const result = JSON.stringify(
      rsp.success
        ? { success: true,  imp_uid: rsp.imp_uid, merchant_uid: rsp.merchant_uid }
        : { success: false, error:   rsp.error_msg }
    );
    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(result);
    } else {
      window.location.href = 'locotalk://certification?data=' + encodeURIComponent(result);
    }
  });
</script>
</body>
</html>
