<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인증 완료</title>
<style>
  body { background:#40D3B6; color:#fff; font-family:-apple-system,sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; text-align:center; }
</style>
</head>
<body>
<div><div style="font-size:48px">✅</div><p>인증 처리 중...</p></div>
<script>
  // ── PortOne V2 모바일 본인인증 결과 리다이렉트 수신 ──────────
  // V2: ?identityVerificationId=...&code=...&message=...  (code 없으면 성공)
  // V1 호환: ?imp_uid=...&merchant_uid=...&success=true
  (function(){
    var p = new URLSearchParams(window.location.search);
    var obj;

    var impUid = p.get('imp_uid') || '';
    if (impUid) {
      // ── V1 구버전 호환 ──
      var ok = (p.get('success') || p.get('imp_success')) === 'true';
      obj = ok
        ? { success:true, imp_uid:impUid, merchant_uid:p.get('merchant_uid')||'' }
        : { success:false, error: p.get('error_msg') || '본인인증에 실패했습니다' };
    } else {
      // ── V2 ──
      var vid  = p.get('identityVerificationId') || '';
      var code = p.get('code');             // 존재하면 실패
      var msg  = p.get('message') || '';
      obj = (vid && (code === null || code === ''))
        ? { success:true, identityVerificationId: vid }
        : { success:false, error: msg || '본인인증에 실패했습니다' };
    }

    var s = JSON.stringify(obj);
    if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(s);
    else window.location.href = 'locotalk://certification?data=' + encodeURIComponent(s);
  })();
</script>
</body>
</html>
